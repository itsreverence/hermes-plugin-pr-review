name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  HERMES_AGENT_SHA: 7acaff5ef2bcbaa22bd23b72efe60906123a4f55

jobs:
  plugin-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install --upgrade pytest pyyaml ruff
      - name: Fetch pinned Hermes Agent plugin APIs
        run: |
          git init /tmp/hermes-agent
          git -C /tmp/hermes-agent remote add origin https://github.com/NousResearch/hermes-agent.git
          git -C /tmp/hermes-agent fetch --depth 1 origin "$HERMES_AGENT_SHA"
          git -C /tmp/hermes-agent checkout --detach FETCH_HEAD
          test "$(git -C /tmp/hermes-agent rev-parse HEAD)" = "$HERMES_AGENT_SHA"
      - name: Ruff
        run: ruff check plugins tests scripts
      - name: Compile
        env:
          PYTHONPATH: ${{ github.workspace }}:/tmp/hermes-agent
        run: python -m py_compile plugins/pr_review/*.py
      - name: Tests
        env:
          PYTHONPATH: ${{ github.workspace }}:/tmp/hermes-agent
        run: python -m pytest tests/plugins -q
      - name: Diff whitespace
        run: git diff --check
